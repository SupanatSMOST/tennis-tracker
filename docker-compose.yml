# Production stack for the Tennis Shot Tracker backend.
# Copy .env.example -> .env, fill in real secrets, then:  docker compose up -d --build
# Boot order is enforced: db (healthy) -> migrate (goose up, runs to completion) -> app.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # db port intentionally NOT published — reachable only on the compose network.

  migrate:
    image: tennis-backend:latest
    build: ./backend
    entrypoint: ["/app/goose", "-dir", "/app/migrations", "postgres", "${DATABASE_URL}", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    image: tennis-backend:latest
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  pgdata:
