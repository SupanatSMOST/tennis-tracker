name: CI

on:
  push:
    branches: [main]
  pull_request:

# Backend (Go) gate. Tests are integration tests against a real PostgreSQL and
# assume the schema already exists, so CI must run goose migrations before them.
# iOS (Swift) and CV (Python) jobs will be added when those layers land.
jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tennis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tennis_test?sslmode=disable
      # Not a real secret — a CI-only value so config.Load() and token signing work.
      JWT_SIGNING_KEY: ci-only-not-a-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...

      - name: Apply migrations (goose)
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          "$(go env GOPATH)/bin/goose" -dir migrations postgres "$DATABASE_URL" up

      - name: Test
        run: go test -race ./...
